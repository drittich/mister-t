<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Change parent</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css" />
    <link rel="stylesheet" href="../css/popup.css" />
</head>
<body>
    <div id="current-parent" class="parent-line" style="display:none;">
        <span class="label">Current parent:</span>
        <span id="current-parent-name"></span>
    </div>

    <label for="search">Pick a new parent</label>
    <input type="text" id="search" placeholder="Type to filter cards…" autofocus />
    <div class="detach-line" id="detach-line" style="display:none;">
        <span class="link" id="detach-btn"></span>
    </div>
    <div class="list" id="list"></div>
    <div class="error" id="error" style="display:none;"></div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="../js/graph.js"></script>
    <script>
        const t = TrelloPowerUp.iframe();

        let allCards = [];
        let currentCardId = null;
        let forbidden = new Set();

        async function load() {
            const card = await t.card('id');
            currentCardId = card.id;

            // Self is always forbidden; descendants get folded in once the
            // walk resolves. Painting the list before then keeps the dialog
            // responsive on deep trees — the descendant set just narrows the
            // results when it arrives.
            forbidden = new Set([currentCardId]);

            // These three calls are independent given currentCardId, so fire
            // them in parallel instead of awaiting in series.
            const cardsP = t.cards('id', 'name');
            const descP = SubtaskGraph.getDescendantIds(t, currentCardId);
            const parentIdP = SubtaskGraph.getParentId(t, currentCardId);

            // Paint as soon as the card list arrives — don't wait for the
            // descendant walk or the parent lookup.
            allCards = await cardsP;
            render(document.getElementById('search').value || '');
            t.sizeTo('body');

            // Re-filter once the descendant walk completes.
            descP.then((desc) => {
                forbidden = new Set([currentCardId, ...desc]);
                render(document.getElementById('search').value || '');
                t.sizeTo('body');
            });

            const parentId = await parentIdP;
            const searchLabel = document.querySelector('label[for="search"]');
            const detachLine = document.getElementById('detach-line');
            const detachBtn = document.getElementById('detach-btn');
            if (parentId) {
                const p = allCards.find((c) => c.id === parentId);
                const pn = p ? p.name : '(card not on this board)';
                const cpName = document.getElementById('current-parent-name');
                cpName.textContent = pn;
                cpName.title = pn;
                document.getElementById('current-parent').style.display = 'flex';
                searchLabel.textContent = 'Pick a new parent';
                // Naming the parent makes the consequence unmistakable, so the user
                // can't mis-click "Detach" while scanning the result list. Title
                // attr keeps the full name available when the link truncates.
                detachBtn.textContent = 'Or detach from "' + pn + '"';
                detachBtn.title = detachBtn.textContent;
                detachLine.style.display = 'flex';
            } else {
                // No parent yet — this popup is doing "Set parent", not "Change".
                // Hide the detach action (nothing to detach from), and adjust
                // the search label to match.
                detachLine.style.display = 'none';
                searchLabel.textContent = 'Pick a parent';
            }

            // Header chrome (current-parent line / detach link / label) just
            // changed — refit. The list itself was already painted above.
            t.sizeTo('body');
        }

        let picking = false;
        function render(query) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            const q = query.trim().toLowerCase();
            const eligible = allCards.filter((c) => !forbidden.has(c.id));
            const matches = q ? eligible.filter((c) => c.name.toLowerCase().includes(q)) : eligible;
            if (!matches.length) {
                const msg = q
                    ? 'No cards match "' + query.trim() + '".'
                    : eligible.length === 0
                        ? 'No eligible parent cards on this board.'
                        : 'No cards available.';
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = msg;
                list.appendChild(empty);
                return;
            }
            const shown = matches.slice(0, 50);
            for (const c of shown) {
                const row = document.createElement('div');
                row.className = 'row';
                row.setAttribute('role', 'button');
                row.setAttribute('tabindex', '0');
                row.title = c.name;
                const nameEl = document.createElement('div');
                nameEl.className = 'name';
                nameEl.textContent = c.name;
                row.appendChild(nameEl);
                row.addEventListener('click', () => pickParent(c.id, row));
                row.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter' || ev.key === ' ') {
                        ev.preventDefault();
                        pickParent(c.id, row);
                    }
                });
                list.appendChild(row);
            }
            if (matches.length > shown.length) {
                const more = document.createElement('div');
                more.className = 'muted';
                more.style.padding = '6px 4px';
                more.textContent = 'Showing ' + shown.length + ' of ' + matches.length + ' — keep typing to narrow.';
                list.appendChild(more);
            }
        }

        async function pickParent(newParentId, rowEl) {
            if (picking) return;
            picking = true;
            if (rowEl) rowEl.style.opacity = '0.5';
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            try {
                await SubtaskGraph.setParent(t, currentCardId, newParentId);
                await t.closePopup();
            } catch (e) {
                picking = false;
                if (rowEl) rowEl.style.opacity = '';
                errEl.textContent = e.message || String(e);
                errEl.style.display = 'block';
            }
        }

        document.getElementById('search').addEventListener('input', (e) => render(e.target.value));

        // Esc closes the popup; Enter picks the first visible candidate.
        document.addEventListener('keydown', (ev) => {
            if (ev.key === 'Escape') {
                ev.preventDefault();
                t.closePopup();
            }
        });
        document.getElementById('search').addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter') {
                ev.preventDefault();
                const firstRow = document.querySelector('#list .row');
                if (firstRow) firstRow.click();
            }
        });

        document.getElementById('detach-btn').addEventListener('click', async () => {
            const btn = document.getElementById('detach-btn');
            if (btn.dataset.busy === '1') return;
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            const originalText = btn.textContent;
            btn.dataset.busy = '1';
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.textContent = 'Detaching…';
            try {
                await SubtaskGraph.setParent(t, currentCardId, null);
                await t.closePopup();
            } catch (e) {
                btn.dataset.busy = '';
                btn.style.opacity = '';
                btn.style.pointerEvents = '';
                btn.textContent = originalText;
                errEl.textContent = e.message || String(e);
                errEl.style.display = 'block';
            }
        });

        load();
    </script>
</body>
</html>
