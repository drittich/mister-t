<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Sub-tasks</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css" />
    <link rel="stylesheet" href="../css/popup.css" />
    <style>
        body { padding: 8px 4px; }
    </style>
</head>
<body>
    <div id="parent-line" class="parent-line" style="display:none;">
        <span class="label" id="parent-line-label">Parent:</span>
        <span class="link" id="parent-name"></span>
        <span class="sibling-nav" id="sibling-nav" style="display:none;">
            <span class="link sibling-btn" id="sibling-prev" role="button" tabindex="0" aria-label="Previous sibling" title="Previous sibling">‹ Prev</span>
            <span class="link sibling-btn" id="sibling-next" role="button" tabindex="0" aria-label="Next sibling" title="Next sibling">Next ›</span>
        </span>
        <span class="link parent-line-action" id="parent-action"></span>
    </div>

    <div id="children"></div>
    <div id="undo-slot"></div>

    <div class="actions" id="add-row">
        <span class="link" id="add-link">+ Add sub-task</span>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="../js/graph.js"></script>
    <script>
        const t = TrelloPowerUp.iframe();

        // Holds an in-flight undo opportunity across re-renders. Trello's
        // t.render() fires whenever pluginData changes, so detach itself causes
        // a re-render — we need to remember "user just detached X, show the
        // strip" through that cycle.
        let pendingUndo = null; // { childId, parentId, name, expiresAt }
        let undoTimer = null;

        function clearUndo() {
            pendingUndo = null;
            if (undoTimer) {
                clearTimeout(undoTimer);
                undoTimer = null;
            }
        }

        function setSiblingBtn(btn, card, goToCard) {
            // Disabled state when at an end of the sibling list — keep the button
            // visible so the user sees the boundary, but make it inert.
            if (!card) {
                btn.classList.add('is-disabled');
                btn.removeAttribute('tabindex');
                btn.setAttribute('aria-disabled', 'true');
                btn.title = '';
                btn.onclick = null;
                btn.onkeydown = null;
                return;
            }
            btn.classList.remove('is-disabled');
            btn.setAttribute('tabindex', '0');
            btn.removeAttribute('aria-disabled');
            btn.title = 'Open ' + card.name;
            btn.onclick = () => goToCard(card);
            btn.onkeydown = (ev) => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    goToCard(card);
                }
            };
        }

        async function render() {
            const me = await t.card('id');
            // `url` is requested so child/parent clicks can use t.navigate() — t.showCard()
            // does not refresh card-back-section iframes (the iframe stays bound to its
            // original card), which would leave this section showing the wrong card's
            // sub-tasks after navigation.
            const allCards = await t.cards('id', 'name', 'url');
            const byId = new Map(allCards.map((c) => [c.id, c]));
            const goToCard = (card) => {
                if (!card) return;
                if (card.url) {
                    t.navigate({ url: card.url });
                } else {
                    t.showCard(card.id);
                }
            };

            const parentId = await SubtaskGraph.getParentId(t, me.id);
            const childIds = await SubtaskGraph.getChildIds(t, me.id);

            const parentLine = document.getElementById('parent-line');
            const parentLineLabel = document.getElementById('parent-line-label');
            const parentName = document.getElementById('parent-name');
            const parentAction = document.getElementById('parent-action');
            const openChangeParent = (e) => {
                t.popup({
                    title: parentId ? 'Change parent' : 'Set parent',
                    url: 'change-parent.html',
                    height: 320,
                    mouseEvent: e,
                });
            };

            // Parent-line policy:
            //   - has parent: show "↑ Parent: <name>  Change"
            //   - no parent + has children: show "+ Set parent…" (still useful — this
            //     branch already manages downstream work, so parent context is meaningful)
            //   - no parent + no children: hide entirely. The empty-state CTA is the
            //     primary action; a secondary "make this a sub-task" link sits beneath
            //     it so the two operations don't compete at equal weight.
            const isOrphanLeaf = !parentId && !childIds.length;
            const siblingNav = document.getElementById('sibling-nav');
            const siblingPrev = document.getElementById('sibling-prev');
            const siblingNext = document.getElementById('sibling-next');
            if (isOrphanLeaf) {
                parentLine.style.display = 'none';
                parentLineLabel.classList.remove('link');
                parentLineLabel.onclick = null;
                parentName.onclick = null;
                parentAction.onclick = null;
                siblingNav.style.display = 'none';
            } else if (parentId) {
                const p = byId.get(parentId);
                const pn = p ? p.name : '(unavailable)';
                parentLine.classList.remove('is-orphan');
                parentLineLabel.textContent = '↑ Parent:';
                parentLineLabel.style.display = '';
                parentLineLabel.classList.add('link');
                parentLineLabel.title = 'Open ' + pn;
                parentLineLabel.onclick = () => goToCard(p);
                parentName.textContent = pn;
                parentName.title = 'Open ' + pn;
                parentName.style.display = '';
                parentName.onclick = () => goToCard(p);
                parentAction.textContent = 'Change';
                parentAction.title = 'Pick a different parent for this card';
                parentAction.onclick = openChangeParent;
                parentLine.style.display = 'flex';

                // Sibling nav: walk the parent's authoritative childIds order. Filter
                // to siblings present on this board (otherwise t.navigate has no URL).
                // Hide entirely when there are no other siblings — a lone child has
                // nowhere to navigate to.
                const siblingIds = (await SubtaskGraph.getChildIds(t, parentId))
                    .filter((id) => byId.has(id));
                const myIdx = siblingIds.indexOf(me.id);
                if (myIdx === -1 || siblingIds.length < 2) {
                    siblingNav.style.display = 'none';
                    siblingPrev.onclick = null;
                    siblingNext.onclick = null;
                } else {
                    siblingNav.style.display = '';
                    const prevCard = myIdx > 0 ? byId.get(siblingIds[myIdx - 1]) : null;
                    const nextCard = myIdx < siblingIds.length - 1 ? byId.get(siblingIds[myIdx + 1]) : null;
                    setSiblingBtn(siblingPrev, prevCard, goToCard);
                    setSiblingBtn(siblingNext, nextCard, goToCard);
                }
            } else {
                parentLine.classList.add('is-orphan');
                parentLineLabel.style.display = 'none';
                parentLineLabel.classList.remove('link');
                parentLineLabel.onclick = null;
                parentName.style.display = 'none';
                parentName.onclick = null;
                parentAction.textContent = '+ Set parent…';
                parentAction.title = 'Make this card a sub-task of another card';
                parentAction.onclick = openChangeParent;
                parentLine.style.display = 'flex';
                siblingNav.style.display = 'none';
            }

            const container = document.getElementById('children');
            const undoSlot = document.getElementById('undo-slot');
            const addRow = document.getElementById('add-row');
            container.innerHTML = '';
            undoSlot.innerHTML = '';

            if (!childIds.length) {
                // Empty state IS the call-to-action. Copy adapts to whether the card
                // is itself a sub-task — leaf nodes already understand the concept.
                const block = document.createElement('div');
                block.className = 'empty-cta';

                const headline = document.createElement('div');
                headline.className = 'empty-cta-headline';
                headline.textContent = parentId
                    ? 'Add a sub-task.'
                    : 'Break this card into sub-tasks.';
                block.appendChild(headline);

                if (!parentId) {
                    const desc = document.createElement('div');
                    desc.className = 'empty-cta-desc';
                    desc.textContent = 'Sub-tasks let you split this into smaller cards.';
                    block.appendChild(desc);
                }

                const cta = document.createElement('button');
                cta.type = 'button';
                cta.className = 'empty-cta-button';
                cta.textContent = 'Add sub-task';
                cta.addEventListener('click', (e) => {
                    t.popup({
                        title: 'Add sub-task',
                        url: 'add-subtask.html',
                        height: 280,
                        mouseEvent: e,
                    });
                });
                block.appendChild(cta);

                // Orphan-leaf only: surface "Set parent" as a quiet secondary link
                // beneath the primary action, since the parent-line is hidden.
                if (isOrphanLeaf) {
                    const setParent = document.createElement('span');
                    setParent.className = 'link empty-cta-secondary';
                    setParent.textContent = 'Or make this a sub-task of another card';
                    setParent.addEventListener('click', openChangeParent);
                    block.appendChild(setParent);
                }

                container.appendChild(block);
                addRow.style.display = 'none';
            } else {
                addRow.style.display = '';
                for (const childId of childIds) {
                    const c = byId.get(childId);
                    const displayName = c ? c.name : '(card not on this board)';
                    const row = document.createElement('div');
                    row.className = 'child-row';
                    const name = document.createElement('div');
                    name.className = 'name';
                    name.textContent = displayName;
                    name.title = displayName;
                    if (c) name.addEventListener('click', () => goToCard(c));

                    // One-click detach. Reversible via the undo strip below the list,
                    // so no inline confirm — match the weight of the action to its
                    // consequence, not to the loudest treatment we could justify.
                    const detach = document.createElement('span');
                    detach.className = 'detach';
                    detach.textContent = 'Detach';
                    detach.title = 'Remove this sub-task relationship';
                    detach.setAttribute('role', 'button');
                    detach.setAttribute('tabindex', '0');
                    detach.setAttribute('aria-label', 'Detach sub-task ' + displayName);

                    const doDetach = async () => {
                        if (detach.dataset.busy === '1') return;
                        detach.dataset.busy = '1';
                        detach.style.opacity = '0.5';
                        try {
                            await SubtaskGraph.setParent(t, childId, null);
                            // Stash the undo opportunity so it survives the t.render()
                            // fired by the pluginData change.
                            pendingUndo = {
                                childId,
                                parentId: me.id,
                                name: displayName,
                                expiresAt: Date.now() + 6000,
                            };
                            // render() runs again via t.render(); no manual re-render here.
                        } catch (e) {
                            detach.dataset.busy = '';
                            detach.style.opacity = '';
                            renderErrorStrip(e.message || String(e), () => doDetach());
                        }
                    };
                    detach.addEventListener('click', doDetach);
                    detach.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter' || ev.key === ' ') {
                            ev.preventDefault();
                            doDetach();
                        }
                    });

                    row.appendChild(name);
                    row.appendChild(detach);
                    container.appendChild(row);
                }
            }

            // Undo strip — only shown if we have a fresh pendingUndo for THIS card.
            // The expiresAt check covers stale state if the user navigates away
            // and comes back to a different card.
            if (pendingUndo && pendingUndo.parentId === me.id && pendingUndo.expiresAt > Date.now()) {
                renderUndoStrip(pendingUndo);
            } else if (pendingUndo) {
                clearUndo();
            }

            t.sizeTo('body');
        }

        function renderUndoStrip(undo) {
            const slot = document.getElementById('undo-slot');
            slot.innerHTML = '';

            const strip = document.createElement('div');
            strip.className = 'undo-strip';

            const msg = document.createElement('span');
            msg.className = 'undo-msg';
            msg.textContent = 'Detached "' + undo.name + '"';
            msg.title = msg.textContent;

            const undoBtn = document.createElement('span');
            undoBtn.className = 'link undo-action';
            undoBtn.textContent = 'Undo';
            undoBtn.setAttribute('role', 'button');
            undoBtn.setAttribute('tabindex', '0');
            const doUndo = async () => {
                if (undoBtn.dataset.busy === '1') return;
                undoBtn.dataset.busy = '1';
                undoBtn.style.opacity = '0.5';
                try {
                    await SubtaskGraph.setParent(t, undo.childId, undo.parentId);
                    clearUndo();
                    // re-render arrives via t.render()
                } catch (e) {
                    undoBtn.dataset.busy = '';
                    undoBtn.style.opacity = '';
                    renderErrorStrip(e.message || String(e), doUndo);
                }
            };
            undoBtn.addEventListener('click', doUndo);
            undoBtn.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    doUndo();
                }
            });

            strip.appendChild(msg);
            strip.appendChild(undoBtn);
            slot.appendChild(strip);

            if (undoTimer) clearTimeout(undoTimer);
            const remaining = Math.max(0, undo.expiresAt - Date.now());
            undoTimer = setTimeout(() => {
                clearUndo();
                slot.innerHTML = '';
                t.sizeTo('body');
            }, remaining);
        }

        function renderErrorStrip(message, onRetry) {
            const slot = document.getElementById('undo-slot');
            slot.innerHTML = '';
            const strip = document.createElement('div');
            strip.className = 'undo-strip is-error';

            const msg = document.createElement('span');
            msg.className = 'undo-msg';
            msg.textContent = 'Detach failed — ' + message;
            msg.title = message;

            const retry = document.createElement('span');
            retry.className = 'link undo-action';
            retry.textContent = 'Try again';
            retry.setAttribute('role', 'button');
            retry.setAttribute('tabindex', '0');
            retry.addEventListener('click', () => onRetry && onRetry());
            retry.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    onRetry && onRetry();
                }
            });

            const dismiss = document.createElement('span');
            dismiss.className = 'link undo-action';
            dismiss.textContent = 'Dismiss';
            dismiss.setAttribute('role', 'button');
            dismiss.setAttribute('tabindex', '0');
            const doDismiss = () => {
                slot.innerHTML = '';
                t.sizeTo('body');
            };
            dismiss.addEventListener('click', doDismiss);
            dismiss.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    doDismiss();
                }
            });

            strip.appendChild(msg);
            strip.appendChild(retry);
            strip.appendChild(dismiss);
            slot.appendChild(strip);
            t.sizeTo('body');
        }

        document.getElementById('add-link').addEventListener('click', (e) => {
            t.popup({
                title: 'Add sub-task',
                url: 'add-subtask.html',
                height: 280,
                mouseEvent: e,
            });
        });

        render();
        t.render(render);
    </script>
</body>
</html>
