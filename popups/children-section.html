<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Sub-tasks</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css" />
    <link rel="stylesheet" href="../css/popup.css" />
    <style>
        body { padding: 8px 4px; }
    </style>
</head>
<body>
    <div id="parent-line" class="parent-line">
        <span class="label" id="parent-line-label">Parent:</span>
        <span class="link" id="parent-name"></span>
        <span class="link parent-line-action" id="parent-action"></span>
    </div>

    <div id="children"></div>

    <div class="actions" id="add-row">
        <span class="link" id="add-link">+ Add sub-task</span>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="../js/graph.js"></script>
    <script>
        const t = TrelloPowerUp.iframe();

        async function render() {
            const me = await t.card('id');
            // `url` is requested so child/parent clicks can use t.navigate() — t.showCard()
            // does not refresh card-back-section iframes (the iframe stays bound to its
            // original card), which would leave this section showing the wrong card's
            // sub-tasks after navigation.
            const allCards = await t.cards('id', 'name', 'url');
            const byId = new Map(allCards.map((c) => [c.id, c]));
            const goToCard = (card) => {
                if (!card) return;
                if (card.url) {
                    t.navigate({ url: card.url });
                } else {
                    // Fallback if the platform ever stops surfacing url on t.cards()
                    t.showCard(card.id);
                }
            };

            // Parent line — visible in both states. With a parent: shows
            // "Parent: <name>  Change". Without: shows "+ Set parent…".
            // The Change/Set-parent link fills the discoverability gap left by
            // Trello's new card-back UI hiding card-buttons behind the rocket icon.
            const parentId = await SubtaskGraph.getParentId(t, me.id);
            const parentLine = document.getElementById('parent-line');
            const parentLineLabel = document.getElementById('parent-line-label');
            const parentName = document.getElementById('parent-name');
            const parentAction = document.getElementById('parent-action');
            const openChangeParent = (e) => {
                t.popup({
                    title: parentId ? 'Change parent' : 'Set parent',
                    url: 'change-parent.html',
                    height: 320,
                    mouseEvent: e,
                });
            };
            if (parentId) {
                const p = byId.get(parentId);
                const pn = p ? p.name : '(unavailable)';
                parentLine.classList.remove('is-orphan');
                // The label and the name share the same click target so the whole
                // left side reads as one navigation control. The ↑ arrow hints at
                // navigation; the link styling on both pieces does the rest.
                parentLineLabel.textContent = '↑ Parent:';
                parentLineLabel.style.display = '';
                parentLineLabel.classList.add('link');
                parentLineLabel.title = 'Open ' + pn;
                parentLineLabel.onclick = () => goToCard(p);
                parentName.textContent = pn;
                parentName.title = 'Open ' + pn;
                parentName.style.display = '';
                parentName.onclick = () => goToCard(p);
                parentAction.textContent = 'Change';
                parentAction.title = 'Pick a different parent for this card';
            } else {
                // No parent yet — slot is now a single "Set parent…" affordance.
                parentLine.classList.add('is-orphan');
                parentLineLabel.style.display = 'none';
                parentLineLabel.classList.remove('link');
                parentLineLabel.onclick = null;
                parentName.style.display = 'none';
                parentName.onclick = null;
                parentAction.textContent = '+ Set parent…';
                parentAction.title = 'Make this card a sub-task of another card';
            }
            parentAction.onclick = openChangeParent;
            parentLine.style.display = 'flex';

            // Children
            const childIds = await SubtaskGraph.getChildIds(t, me.id);
            const container = document.getElementById('children');
            const addRow = document.getElementById('add-row');
            container.innerHTML = '';
            if (!childIds.length) {
                // The empty state IS the call-to-action — one block, action-forward.
                // Copy adapts to whether this card is itself a sub-task: leaf nodes
                // skip the concept framing since the user already understands it.
                const block = document.createElement('div');
                block.className = 'empty-cta';

                const headline = document.createElement('div');
                headline.className = 'empty-cta-headline';
                headline.textContent = parentId
                    ? 'Add a sub-task.'
                    : 'Break this card into sub-tasks.';
                block.appendChild(headline);

                if (!parentId) {
                    const desc = document.createElement('div');
                    desc.className = 'empty-cta-desc';
                    desc.textContent = 'Track smaller pieces of work that roll up to this card.';
                    block.appendChild(desc);
                }

                const cta = document.createElement('button');
                cta.type = 'button';
                cta.className = 'empty-cta-button';
                cta.textContent = 'Add sub-task';
                cta.addEventListener('click', (e) => {
                    t.popup({
                        title: 'Add sub-task',
                        url: 'add-subtask.html',
                        height: 280,
                        mouseEvent: e,
                    });
                });
                block.appendChild(cta);

                container.appendChild(block);
                // Hide the bottom link to avoid two CTAs for the same action.
                addRow.style.display = 'none';
            } else {
                addRow.style.display = '';
                for (const childId of childIds) {
                    const c = byId.get(childId);
                    const displayName = c ? c.name : '(card not on this board)';
                    const row = document.createElement('div');
                    row.className = 'child-row';
                    const name = document.createElement('div');
                    name.className = 'name';
                    name.textContent = displayName;
                    name.title = displayName; // long names truncate; reveal full on hover
                    if (c) name.addEventListener('click', () => goToCard(c));

                    // Action area swaps between three states:
                    //   1. idle:    "× detach"
                    //   2. confirm: "Detach? [Yes] [Cancel]"
                    //   3. error:   "Couldn't detach. [Retry] [Dismiss]"
                    // A single click on "× detach" only opens the confirm — never destroys.
                    const action = document.createElement('span');
                    action.className = 'detach-action';
                    row.appendChild(name);
                    row.appendChild(action);

                    let confirmTimer = null;
                    const clearConfirmTimer = () => {
                        if (confirmTimer) {
                            clearTimeout(confirmTimer);
                            confirmTimer = null;
                        }
                    };

                    const renderIdle = () => {
                        clearConfirmTimer();
                        action.innerHTML = '';
                        action.removeAttribute('role');
                        action.removeAttribute('aria-label');
                        const btn = document.createElement('span');
                        btn.className = 'detach';
                        btn.textContent = '× detach';
                        btn.title = 'Remove this sub-task relationship';
                        btn.setAttribute('role', 'button');
                        btn.setAttribute('tabindex', '0');
                        btn.setAttribute('aria-label', 'Remove sub-task ' + displayName);
                        const open = () => renderConfirm();
                        btn.addEventListener('click', open);
                        btn.addEventListener('keydown', (ev) => {
                            if (ev.key === 'Enter' || ev.key === ' ') {
                                ev.preventDefault();
                                open();
                            }
                        });
                        action.appendChild(btn);
                    };

                    const renderConfirm = () => {
                        action.innerHTML = '';
                        action.setAttribute('role', 'group');
                        action.setAttribute('aria-label', 'Confirm detach ' + displayName);

                        const prompt = document.createElement('span');
                        prompt.className = 'muted';
                        prompt.textContent = 'Detach?';
                        prompt.style.marginRight = '4px';

                        const yes = document.createElement('span');
                        yes.className = 'detach detach-confirm';
                        yes.textContent = 'Yes';
                        yes.setAttribute('role', 'button');
                        yes.setAttribute('tabindex', '0');
                        yes.setAttribute('aria-label', 'Confirm detach ' + displayName);

                        const no = document.createElement('span');
                        no.className = 'detach detach-cancel';
                        no.textContent = 'Cancel';
                        no.setAttribute('role', 'button');
                        no.setAttribute('tabindex', '0');
                        no.setAttribute('aria-label', 'Cancel detach');

                        const cancel = () => renderIdle();
                        no.addEventListener('click', cancel);
                        no.addEventListener('keydown', (ev) => {
                            if (ev.key === 'Enter' || ev.key === ' ' || ev.key === 'Escape') {
                                ev.preventDefault();
                                cancel();
                            }
                        });

                        let confirming = false;
                        const confirm = async () => {
                            if (confirming) return;
                            confirming = true;
                            clearConfirmTimer();
                            yes.style.opacity = '0.5';
                            yes.style.pointerEvents = 'none';
                            no.style.pointerEvents = 'none';
                            try {
                                await SubtaskGraph.setParent(t, childId, null);
                                // Successful detach triggers t.render() elsewhere, which re-runs
                                // render() above. No need to re-render here ourselves.
                            } catch (e) {
                                confirming = false;
                                renderError(e.message || String(e));
                            }
                        };
                        yes.addEventListener('click', confirm);
                        yes.addEventListener('keydown', (ev) => {
                            if (ev.key === 'Enter' || ev.key === ' ') {
                                ev.preventDefault();
                                confirm();
                            } else if (ev.key === 'Escape') {
                                ev.preventDefault();
                                cancel();
                            }
                        });

                        action.appendChild(prompt);
                        action.appendChild(yes);
                        action.appendChild(no);
                        // Move keyboard focus to Cancel — the safe default.
                        no.focus();

                        // Auto-revert after 8s of inactivity. Stops a forgotten confirm
                        // from sitting there indefinitely if the user navigates away mentally.
                        clearConfirmTimer();
                        confirmTimer = setTimeout(() => renderIdle(), 8000);
                    };

                    const renderError = (msg) => {
                        action.innerHTML = '';
                        action.removeAttribute('role');
                        action.removeAttribute('aria-label');
                        const errSpan = document.createElement('span');
                        errSpan.className = 'detach detach-error-msg';
                        errSpan.textContent = "Couldn't detach.";
                        errSpan.title = msg;

                        const retry = document.createElement('span');
                        retry.className = 'detach detach-retry';
                        retry.textContent = 'Retry';
                        retry.setAttribute('role', 'button');
                        retry.setAttribute('tabindex', '0');

                        const dismiss = document.createElement('span');
                        dismiss.className = 'detach detach-cancel';
                        dismiss.textContent = 'Dismiss';
                        dismiss.setAttribute('role', 'button');
                        dismiss.setAttribute('tabindex', '0');

                        retry.addEventListener('click', () => renderConfirm());
                        retry.addEventListener('keydown', (ev) => {
                            if (ev.key === 'Enter' || ev.key === ' ') {
                                ev.preventDefault();
                                renderConfirm();
                            }
                        });
                        dismiss.addEventListener('click', () => renderIdle());
                        dismiss.addEventListener('keydown', (ev) => {
                            if (ev.key === 'Enter' || ev.key === ' ') {
                                ev.preventDefault();
                                renderIdle();
                            }
                        });

                        action.appendChild(errSpan);
                        action.appendChild(retry);
                        action.appendChild(dismiss);
                    };

                    renderIdle();
                    container.appendChild(row);
                }
            }

            t.sizeTo('body');
        }

        document.getElementById('add-link').addEventListener('click', (e) => {
            t.popup({
                title: 'Add sub-task',
                url: 'add-subtask.html',
                height: 280,
                mouseEvent: e,
            });
        });

        render();

        // Re-render whenever the card's pluginData changes elsewhere.
        t.render(render);
    </script>
</body>
</html>
